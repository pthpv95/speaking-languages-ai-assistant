services:
  voice-ai:
    build: .
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8443
      --ssl-certfile /certs/cert.pem --ssl-keyfile /certs/key.pem
    ports:
      - "8443:8443"
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
    volumes:
      - voice_data:/data
      - ./cert.pem:/certs/cert.pem:ro
      - ./key.pem:/certs/key.pem:ro
    restart: unless-stopped

volumes:
  voice_data:
