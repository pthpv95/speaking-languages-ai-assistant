<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <title>Voice AI Coach</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Voice AI">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --bg1: #161b22;
      --bg2: #21262d;
      --line: #30363d;
      --muted: #484f58;
      --soft: #8b949e;
      --text: #e6edf3;
      --green: #3fb950;
      --gd: #0d2a14;
      --gb: #1a4225;
      --blue: #58a6ff;
      --red: #f85149;
      --amber: #d29922;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
      --sidebar-w: 280px;
      /* iOS safe areas */
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
      /* Dynamic viewport height — falls back to vh for older browsers */
      --app-height: 100vh;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: var(--app-height);
      overflow: hidden;
      /* Prevent iOS rubber-band overscroll */
      overscroll-behavior: none;
      position: fixed;
      width: 100%;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Allow text selection in chat bubbles */
    .bubble { -webkit-user-select: text; user-select: text; }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(63, 185, 80, .025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(63, 185, 80, .025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── App layout ── */
    #app-wrapper {
      display: flex;
      height: var(--app-height);
      position: relative;
      z-index: 1;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg1);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      height: var(--app-height);
      transition: transform .25s ease;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      padding-top: calc(16px + var(--sat));
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .sidebar-header h2 {
      font-size: 14px;
      font-weight: 500;
      color: var(--soft);
    }

    #new-conv-btn {
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid var(--gb);
      background: var(--gd);
      color: var(--green);
      cursor: pointer;
      /* 44px touch target */
      min-height: 36px;
      -webkit-tap-highlight-color: transparent;
    }

    #conv-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px;
      padding-left: calc(8px + var(--sal));
    }
    #conv-list::-webkit-scrollbar { width: 4px; }
    #conv-list::-webkit-scrollbar-thumb { background: var(--bg2); border-radius: 2px; }

    .conv-item {
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 2px;
      border-left: 3px solid transparent;
      /* 44px min touch target */
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .conv-item.active {
      background: var(--bg2);
      border-left-color: var(--green);
    }
    /* Hover only on devices that support it */
    @media (hover: hover) {
      .conv-item:hover { background: var(--bg2); }
      #new-conv-btn:hover { background: var(--gb); }
    }

    .conv-title {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    .conv-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .conv-lang-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      background: var(--gd);
      border: 1px solid var(--gb);
      color: var(--green);
    }

    .conv-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* Edit icon for mobile title editing */
    .conv-edit-btn {
      display: none;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      padding: 4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      margin-left: auto;
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 12px 16px;
      padding-bottom: calc(12px + var(--sab));
      padding-left: calc(16px + var(--sal));
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .sidebar-footer .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg2);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--soft);
      flex-shrink: 0;
    }

    .sidebar-footer .username {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--soft);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Sidebar overlay (mobile) ── */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 9;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Main area ── */
    #main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      min-width: 0;
    }

    .container {
      width: 100%;
      max-width: 680px;
      padding: 24px 20px 8px;
      padding-right: calc(20px + var(--sar));
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      padding-top: var(--sat);
      flex-shrink: 0;
    }

    #hamburger {
      display: none;
      background: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--soft);
      font-size: 18px;
      padding: 6px 10px;
      cursor: pointer;
      line-height: 1;
      min-width: 44px;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .lang-toggle {
      display: flex;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }
    .lang-toggle-btn {
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 14px;
      border: none;
      border-right: 1px solid var(--line);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: color .15s, background .15s;
      /* 44px touch target */
      min-height: 36px;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-toggle-btn:last-child { border-right: none; }
    .lang-toggle-btn.active {
      background: var(--gd);
      color: var(--green);
    }
    @media (hover: hover) {
      .lang-toggle-btn:hover:not(.active) { color: var(--soft); }
    }

    #notify-btn {
      font-size: 16px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: none;
      cursor: pointer;
      min-width: 44px;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    #notify-btn.active { border-color: var(--gb); background: var(--gd); }
    @media (hover: hover) {
      #notify-btn:hover { border-color: var(--soft); }
    }

    /* tone selector — horizontal scroll on mobile */
    .tone-bar {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      /* Hide scrollbar but keep functionality */
      scrollbar-width: none;
      -ms-overflow-style: none;
      /* Pad for scroll edges */
      padding-bottom: 2px;
    }
    .tone-bar::-webkit-scrollbar { display: none; }

    .tone-btn {
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      flex-shrink: 0;
      /* 44px touch target */
      min-height: 36px;
      -webkit-tap-highlight-color: transparent;
    }
    .tone-btn.active {
      background: var(--gd);
      color: var(--green);
      border-color: var(--gb);
    }
    @media (hover: hover) {
      .tone-btn:hover:not(.active) { color: var(--soft); border-color: var(--soft); }
    }

    /* ── conversation ── */
    #conversation {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 4px 2px;
      scroll-behavior: smooth;
      /* Ensure content doesn't go under safe areas */
      min-height: 0;
    }
    #conversation::-webkit-scrollbar { width: 4px; }
    #conversation::-webkit-scrollbar-track { background: transparent; }
    #conversation::-webkit-scrollbar-thumb { background: var(--bg2); border-radius: 2px; }

    .bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.6;
      animation: popIn .2s ease both;
      word-break: break-word;
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(6px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--bg2);
      border: 1px solid var(--line);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }
    .bubble.ai {
      align-self: flex-start;
      background: var(--gd);
      border: 1px solid var(--gb);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .bubble.ai .tip {
      color: var(--green);
      font-family: var(--mono);
      font-size: 12px;
      margin-top: 6px;
      display: block;
    }

    /* Collapsible lesson block */
    .lesson-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 6px 10px;
      background: rgba(63, 185, 80, .08);
      border: 1px solid var(--gb);
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      min-height: 36px;
    }
    .lesson-toggle-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--green);
      flex: 1;
    }
    .lesson-toggle-arrow {
      font-size: 10px;
      color: var(--green);
      transition: transform .2s;
    }
    .lesson-toggle.open .lesson-toggle-arrow {
      transform: rotate(180deg);
    }
    .lesson-content {
      display: none;
      margin-top: 8px;
      padding: 8px 10px;
      background: rgba(63, 185, 80, .05);
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      line-height: 1.6;
    }
    .lesson-content.open {
      display: block;
    }

    /* Replay button */
    .replay-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--gb);
      background: rgba(63, 185, 80, .08);
      color: var(--green);
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      transition: background .15s, opacity .15s;
      line-height: 1;
    }
    .replay-btn:active { background: var(--gb); }
    .replay-btn.loading {
      opacity: .5;
      pointer-events: none;
    }
    @media (hover: hover) {
      .replay-btn:hover { background: var(--gb); }
    }

    .bubble.error {
      align-self: flex-start;
      background: rgba(248, 81, 73, .07);
      border: 1px solid rgba(248, 81, 73, .25);
      color: var(--red);
      font-family: var(--mono);
      font-size: 13px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 200px;
      color: var(--muted);
      font-size: 14px;
      font-family: var(--mono);
    }
    .empty-state span:first-child { font-size: 32px; }

    /* ── latency badge ── */
    .latency-badge {
      align-self: flex-start;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      padding: 2px 8px;
      background: var(--bg2);
      border-radius: 4px;
      margin-top: -6px;
      margin-left: 6px;
    }
    .latency-badge.fast { color: var(--green); }
    .latency-badge.ok { color: var(--amber); }
    .latency-badge.slow { color: var(--red); }

    /* ── record controls ── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 0;
      padding-bottom: var(--sab);
      flex-shrink: 0;
    }

    #record-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid var(--green);
      background: var(--gd);
      color: var(--green);
      font-size: 22px;
      cursor: pointer;
      transition: all .2s;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 0 rgba(63, 185, 80, 0);
      -webkit-tap-highlight-color: transparent;
      /* Prevent iOS callout */
      -webkit-touch-callout: none;
    }
    @media (hover: hover) {
      #record-btn:hover:not(:disabled) {
        background: var(--gb);
        box-shadow: 0 0 0 6px rgba(63, 185, 80, .12);
      }
    }
    #record-btn:active:not(:disabled) {
      transform: scale(.95);
    }
    #record-btn.recording {
      border-color: var(--red);
      background: rgba(248, 81, 73, .12);
      color: var(--red);
      animation: pulse 1.4s ease infinite;
    }
    #record-btn:disabled {
      border-color: var(--muted);
      background: var(--bg2);
      color: var(--muted);
      cursor: not-allowed;
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, .4); }
      50% { box-shadow: 0 0 0 10px rgba(248, 81, 73, 0); }
    }

    #timer {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--red);
      letter-spacing: 1px;
    }
    #timer:empty { display: none; }

    #status {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .5px;
    }
    #status:empty { display: none; }
    #status.active { color: var(--green); }
    #status.error { color: var(--red); }

    /* ── pipeline viz ── */
    #pipeline {
      display: none;
      gap: 6px;
      justify-content: center;
      align-items: center;
      font-family: var(--mono);
      font-size: 11px;
      flex-shrink: 0;
    }
    #pipeline.visible { display: flex; }
    .pipe-step {
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: var(--bg1);
      transition: all .2s;
    }
    .pipe-step.active { border-color: var(--amber); color: var(--amber); background: #2a1f07; }
    .pipe-step.done { border-color: var(--green); color: var(--green); background: var(--gd); }
    .pipe-arrow { color: var(--muted); font-size: 10px; }

    /* ── Username modal ── */
    #username-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, .6);
      align-items: center;
      justify-content: center;
      padding: 20px;
      /* Allow modal to scroll if keyboard pushes it */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #username-modal.visible { display: flex; }

    .modal-box {
      background: var(--bg1);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 32px 24px;
      width: 360px;
      max-width: 100%;
      text-align: center;
    }
    .modal-box h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }
    .modal-box p {
      font-size: 14px;
      color: var(--soft);
      margin-bottom: 24px;
    }
    .modal-box input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      /* 16px prevents iOS zoom on focus */
      font-size: 16px;
      outline: none;
      margin-bottom: 16px;
      -webkit-appearance: none;
      appearance: none;
    }
    .modal-box input:focus { border-color: var(--green); }
    .modal-box button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--green);
      color: var(--bg);
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      appearance: none;
    }
    .modal-box button:active { opacity: .85; }
    .modal-box button:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Responsive (mobile < 768px) ── */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        left: 0; top: 0;
        z-index: 10;
        transform: translateX(-100%);
        /* Full height including safe areas */
        height: var(--app-height);
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay.visible { display: block; }
      #hamburger { display: flex; }

      .container {
        padding: 12px 14px 8px;
        padding-right: calc(14px + var(--sar));
        padding-left: calc(14px + var(--sal));
        gap: 10px;
      }

      header {
        gap: 8px;
        padding-bottom: 8px;
      }

      header h1 { font-size: 15px; }

      .bubble { max-width: 88%; font-size: 15px; }

      .empty-state { height: 140px; }

      /* Show edit button on mobile instead of dblclick */
      .conv-edit-btn { display: block; }

      .controls {
        gap: 4px;
        padding: 4px 0;
        padding-bottom: var(--sab);
      }
    }

    /* ── Small phones (iPhone SE, etc.) ── */
    @media (max-width: 380px) {
      .container { padding: 8px 10px 4px; gap: 8px; }
      header h1 { font-size: 14px; }
      #record-btn { width: 52px; height: 52px; font-size: 20px; }
      .bubble { font-size: 14px; padding: 10px 14px; }
      .tone-btn { font-size: 11px; padding: 6px 10px; }
    }

    /* ── Landscape phone ── */
    @media (max-height: 500px) and (orientation: landscape) {
      .controls { padding: 4px 0; gap: 4px; }
      #record-btn { width: 48px; height: 48px; font-size: 18px; }
      #timer { min-height: 14px; font-size: 11px; }
    }
  </style>
</head>

<body>

<!-- Username modal -->
<div id="username-modal">
  <div class="modal-box">
    <h2>Welcome</h2>
    <p>Enter your name to start practicing</p>
    <input type="text" id="username-input" placeholder="Your name" maxlength="30" autocomplete="off"
      enterkeyhint="go">
    <button id="username-submit" onclick="submitUsername()">Start</button>
  </div>
</div>

<div id="app-wrapper">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>Conversations</h2>
      <button id="new-conv-btn" onclick="newConversation()">+ New</button>
    </div>
    <div id="conv-list"></div>
    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar"></div>
      <span class="username" id="sidebar-username"></span>
    </div>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Main area -->
  <div id="main-area">
    <div class="container">

      <header>
        <button id="hamburger" onclick="toggleSidebar()">&#9776;</button>
        <h1>Voice AI Coach</h1>
        <div class="header-right">
          <div class="lang-toggle" id="lang-toggle"></div>
          <button id="notify-btn" onclick="toggleReminder()" title="Practice reminders">&#x1F514;</button>
        </div>
      </header>

      <!-- Tone selector -->
      <div class="tone-bar" id="tone-bar"></div>

      <!-- Conversation -->
      <div id="conversation">
        <div class="empty-state" id="empty">
          <span>&#x1F3A4;</span>
          <span>Tap the mic to start speaking</span>
        </div>
      </div>

      <!-- Pipeline status -->
      <div id="pipeline">
        <span class="pipe-step" id="step-asr">ASR</span>
        <span class="pipe-arrow">&rarr;</span>
        <span class="pipe-step" id="step-llm">LLM</span>
        <span class="pipe-arrow">&rarr;</span>
        <span class="pipe-step" id="step-tts">TTS</span>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button id="record-btn" onclick="toggleRecord()">&#x1F3A4;</button>
        <div id="timer"></div>
        <div id="status"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ── iOS viewport height fix ───────────────────────────────────────────────────
// 100vh on iOS Safari includes the URL bar area. This JS sets a CSS variable
// to the actual visible height and updates on resize/orientation change.
function setAppHeight() {
  document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
}
setAppHeight();
window.addEventListener('resize', setAppHeight);
window.addEventListener('orientationchange', () => {
  // iOS needs a slight delay after orientation change
  setTimeout(setAppHeight, 100);
});

// Prevent iOS Safari bounce/pull-to-refresh on the body
document.body.addEventListener('touchmove', function(e) {
  // Only prevent on body itself, not on scrollable children
  if (e.target === document.body) e.preventDefault();
}, { passive: false });

// ── State ──────────────────────────────────────────────────────────────────────
const state = {
  username: localStorage.getItem('voiceai_username'),
  conversations: [],
  currentConvId: null,
  currentLanguage: 'chinese',
  currentTone: 'hype',
  availableTones: {},
  availableLanguages: [],
};

let mediaRecorder = null;
let audioChunks = [];
let recording = false;
let chatSocket = null;       // WebSocket for streaming pipeline
let audioQueue = [];         // queued audio blobs to play in order
let isPlayingQueue = false;  // whether we're playing through the queue
let timerInterval = null;
let timerSeconds = 0;
let activeAudio = null;
let unlockedAudio = null;

// ── API helper ────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = opts.headers || {};
  if (state.username) {
    headers['X-Username'] = state.username;
  }
  opts.headers = headers;
  const r = await fetch(path, opts);
  if (r.status === 401) {
    showUsernameModal();
    throw new Error('login required');
  }
  return r;
}

// ── Init ───────────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", async () => {
  if (!state.username) {
    showUsernameModal();
    return;
  }
  await initApp();
});

async function initApp() {
  try {
    const r = await fetch("/config");
    const c = await r.json();
    state.availableLanguages = c.available_languages;
    state.availableTones = c.available_tones;

    renderLangToggle();

    await loadConversations();

    if (state.conversations.length === 0) {
      await newConversation();
    } else {
      await selectConversation(state.conversations[0].id);
    }

    updateSidebarFooter();
  } catch (e) {
    setStatus("cannot reach server", "error");
  }
}

// ── Username modal ────────────────────────────────────────────────────────────
function showUsernameModal() {
  document.getElementById('username-modal').classList.add('visible');
  // Delay focus — iOS needs the modal to be visible first
  setTimeout(() => document.getElementById('username-input').focus(), 300);
}

document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('username-input');
  if (input) {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        input.blur(); // dismiss iOS keyboard
        submitUsername();
      }
    });
  }
});

async function submitUsername() {
  const input = document.getElementById('username-input');
  const name = input.value.trim();
  if (!name) return;

  const btn = document.getElementById('username-submit');
  btn.disabled = true;
  btn.textContent = 'Starting...';

  try {
    const r = await fetch('/api/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: name }),
    });
    if (!r.ok) throw new Error(await r.text());

    state.username = name;
    localStorage.setItem('voiceai_username', name);
    document.getElementById('username-modal').classList.remove('visible');
    await initApp();
  } catch (e) {
    btn.textContent = 'Error — try again';
    setTimeout(() => { btn.textContent = 'Start'; btn.disabled = false; }, 2000);
  }
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const isOpen = sidebar.classList.toggle('open');
  overlay.classList.toggle('visible', isOpen);
  // Prevent body scroll when sidebar is open
  document.body.style.overflow = isOpen ? 'hidden' : '';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
  document.body.style.overflow = '';
}

function updateSidebarFooter() {
  const avatar = document.getElementById('user-avatar');
  const nameEl = document.getElementById('sidebar-username');
  if (state.username) {
    avatar.textContent = state.username[0].toUpperCase();
    nameEl.textContent = state.username;
  }
}

async function loadConversations() {
  const r = await api('/api/conversations');
  state.conversations = await r.json();
  renderConvList();
}

function renderConvList() {
  const list = document.getElementById('conv-list');
  list.innerHTML = '';
  for (const conv of state.conversations) {
    const item = document.createElement('div');
    item.className = 'conv-item' + (conv.id === state.currentConvId ? ' active' : '');
    item.dataset.id = conv.id;

    const titleRow = document.createElement('div');
    titleRow.style.cssText = 'display:flex;align-items:center;gap:4px;';

    const title = document.createElement('div');
    title.className = 'conv-title';
    title.textContent = conv.title;
    title.style.flex = '1';
    title.style.minWidth = '0';

    // Desktop: double-click to edit
    title.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      startTitleEdit(item, conv.id, title);
    });

    // Mobile: edit button (visible via CSS on mobile)
    const editBtn = document.createElement('button');
    editBtn.className = 'conv-edit-btn';
    editBtn.innerHTML = '&#x270E;';
    editBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      startTitleEdit(item, conv.id, title);
    });

    titleRow.appendChild(title);
    titleRow.appendChild(editBtn);

    const meta = document.createElement('div');
    meta.className = 'conv-meta';

    const badge = document.createElement('span');
    badge.className = 'conv-lang-badge';
    badge.textContent = conv.language;

    const time = document.createElement('span');
    time.className = 'conv-time';
    time.textContent = relativeTime(conv.updated_at);

    meta.appendChild(badge);
    meta.appendChild(time);
    item.appendChild(titleRow);
    item.appendChild(meta);

    item.addEventListener('click', () => {
      selectConversation(conv.id);
      closeSidebar();
    });

    list.appendChild(item);
  }
}

function startTitleEdit(item, convId, titleEl) {
  const input = document.createElement('input');
  input.type = 'text';
  input.value = titleEl.textContent;
  // 16px to prevent iOS zoom
  input.style.cssText = 'width:100%;padding:4px 8px;background:var(--bg);color:var(--text);border:1px solid var(--green);border-radius:6px;font-size:16px;font-family:var(--sans);outline:none;min-height:36px;';

  titleEl.replaceWith(input);
  input.focus();
  input.select();

  let saved = false;
  const save = async () => {
    if (saved) return;
    saved = true;
    const newTitle = input.value.trim() || 'New conversation';
    const newEl = document.createElement('div');
    newEl.className = 'conv-title';
    newEl.style.flex = '1';
    newEl.style.minWidth = '0';
    newEl.textContent = newTitle;
    newEl.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      startTitleEdit(item, convId, newEl);
    });
    input.replaceWith(newEl);
    await api(`/api/conversations/${convId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: newTitle }),
    });
    const c = state.conversations.find(x => x.id === convId);
    if (c) c.title = newTitle;
  };

  input.addEventListener('blur', save);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = titleEl.textContent; input.blur(); }
  });
}

async function selectConversation(convId) {
  state.currentConvId = convId;

  const r = await api(`/api/conversations/${convId}`);
  const data = await r.json();

  state.currentLanguage = data.language;
  state.currentTone = data.tone;

  updateLangUI(data.language);
  renderToneBar();
  renderMessages(data.messages);
  renderConvList();
}

async function newConversation() {
  const r = await api('/api/conversations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      language: state.currentLanguage,
      tone: state.currentTone,
    }),
  });
  const conv = await r.json();
  state.conversations.unshift(conv);
  await selectConversation(conv.id);
  closeSidebar();
}

function renderMessages(messages) {
  const conv = document.getElementById('conversation');
  conv.innerHTML = '';
  if (!messages || messages.length === 0) {
    conv.innerHTML = '<div class="empty-state" id="empty"><span>&#x1F3A4;</span><span>Tap the mic to start speaking</span></div>';
    return;
  }
  for (const msg of messages) {
    addBubble(msg.role === 'assistant' ? 'ai' : 'user', msg.content, false);
  }
  // Use requestAnimationFrame to ensure DOM is rendered before scrolling
  requestAnimationFrame(() => { conv.scrollTop = conv.scrollHeight; });
}

// ── Language & Tone ───────────────────────────────────────────────────────────
function renderLangToggle() {
  const container = document.getElementById('lang-toggle');
  container.innerHTML = '';
  const labels = { english: 'EN', chinese: '中文' };
  for (const lang of state.availableLanguages) {
    const btn = document.createElement('button');
    btn.className = 'lang-toggle-btn' + (lang === state.currentLanguage ? ' active' : '');
    btn.textContent = labels[lang] || lang;
    btn.dataset.lang = lang;
    btn.onclick = () => switchLang(lang);
    container.appendChild(btn);
  }
}

function updateLangUI(lang) {
  state.currentLanguage = lang;
  document.title = `Voice AI — ${lang}`;
  document.querySelectorAll('.lang-toggle-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
}

function renderToneBar() {
  const bar = document.getElementById('tone-bar');
  bar.innerHTML = '';
  const tones = state.availableTones[state.currentLanguage] || {};
  for (const [key, label] of Object.entries(tones)) {
    const btn = document.createElement('button');
    btn.className = 'tone-btn' + (key === state.currentTone ? ' active' : '');
    btn.textContent = label;
    btn.dataset.tone = key;
    btn.onclick = () => switchTone(key);
    bar.appendChild(btn);
  }
}

async function switchLang(lang) {
  if (lang === state.currentLanguage || !state.currentConvId) return;
  if (activeAudio) { activeAudio.pause(); activeAudio = null; }

  setStatus('switching language...');
  try {
    await api(`/api/conversations/${state.currentConvId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ language: lang, tone: 'hype' }),
    });
    state.currentLanguage = lang;
    state.currentTone = 'hype';
    updateLangUI(lang);
    renderToneBar();
    const c = state.conversations.find(x => x.id === state.currentConvId);
    if (c) { c.language = lang; c.tone = 'hype'; }
    renderConvList();
    setStatus('');
  } catch (e) {
    setStatus('switch failed', 'error');
  }
}

async function switchTone(tone) {
  if (tone === state.currentTone || !state.currentConvId) return;
  if (activeAudio) { activeAudio.pause(); activeAudio = null; }

  setStatus('switching tone...');
  try {
    await api(`/api/conversations/${state.currentConvId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tone: tone }),
    });
    state.currentTone = tone;
    document.querySelectorAll('.tone-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tone === tone);
    });
    const c = state.conversations.find(x => x.id === state.currentConvId);
    if (c) c.tone = tone;
    setStatus('');
  } catch (e) {
    setStatus('tone switch failed', 'error');
  }
}

// ── WebSocket helpers ─────────────────────────────────────────────────────────
function getWsUrl() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  return `${proto}//${location.host}/ws/chat`;
}

function ensureSocket() {
  return new Promise((resolve, reject) => {
    if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
      resolve(chatSocket);
      return;
    }
    const ws = new WebSocket(getWsUrl());
    ws.binaryType = "arraybuffer";
    ws.onopen = () => { chatSocket = ws; resolve(ws); };
    ws.onerror = (e) => { chatSocket = null; reject(e); };
    ws.onclose = () => { chatSocket = null; };
    ws.onmessage = handleWsMessage;
  });
}

// ── Audio queue player ────────────────────────────────────────────────────────
async function playNextInQueue() {
  if (isPlayingQueue || audioQueue.length === 0) return;
  isPlayingQueue = true;
  setStatus("speaking...", "active");

  while (audioQueue.length > 0) {
    const { blob } = audioQueue.shift();
    const url = URL.createObjectURL(blob);
    await new Promise((resolve) => {
      const audio = unlockedAudio || new Audio();
      unlockedAudio = null;
      activeAudio = audio;
      audio.setAttribute('playsinline', '');
      audio.src = url;
      audio.onended = () => { URL.revokeObjectURL(url); activeAudio = null; resolve(); };
      audio.onerror = () => { URL.revokeObjectURL(url); activeAudio = null; resolve(); };
      audio.play().catch(() => resolve());
    });
  }

  isPlayingQueue = false;
  setStatus("");
}

// ── WS message state (shared across messages for one interaction) ─────────────
let _wsT0 = 0;
let _wsAsrMs = 0;
let _wsAiBubble = null;  // the AI bubble DOM element we update progressively

function handleWsMessage(event) {
  if (typeof event.data === "string") {
    const msg = JSON.parse(event.data);

    if (msg.type === "transcript") {
      _wsAsrMs = msg.asr_ms || 0;
      setStep("asr", "done");
      addBubble("user", msg.text);
      setStep("llm", "active");
      setStatus("thinking...");
    }

    else if (msg.type === "sentence") {
      setStep("llm", "done");
      setStep("tts", "active");
      // Progressively build the AI bubble
      if (!_wsAiBubble) {
        _wsAiBubble = addBubble("ai", msg.text, true, true);
      } else {
        appendToBubble(_wsAiBubble, msg.text);
      }
    }

    else if (msg.type === "audio") {
      // Queue audio for playback
      const audioBytes = Uint8Array.from(atob(msg.audio_base64), c => c.charCodeAt(0));
      const audioBlob = new Blob([audioBytes], { type: msg.audio_mime || "audio/wav" });
      audioQueue.push({ blob: audioBlob, index: msg.index });
      // Start playing as soon as first audio arrives
      playNextInQueue();
    }

    else if (msg.type === "done") {
      setStep("tts", "done");
      const endToEndMs = Math.round(performance.now() - _wsT0);
      addLatencyBadge(endToEndMs, _wsAsrMs, msg.llm_ms, msg.tts_ms);
      // Finalize the AI bubble with the full reply (handles [LESSON] formatting)
      if (_wsAiBubble) {
        finalizeBubble(_wsAiBubble, msg.reply);
      }
      _wsAiBubble = null;
      showPipeline(false);
      reset();
      loadConversations();
    }

    else if (msg.type === "error") {
      showError(msg.detail || "pipeline error");
      showPipeline(false);
      reset();
    }
  }
}

// ── Record toggle ──────────────────────────────────────────────────────────────
async function toggleRecord() {
  if (recording) stopRecording();
  else await startRecording();
}

async function startRecording() {
  if (activeAudio) { activeAudio.pause(); activeAudio = null; }
  audioQueue = [];
  isPlayingQueue = false;
  _wsAiBubble = null;

  if (!state.currentConvId) {
    setStatus("no conversation selected", "error");
    return;
  }

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    setStatus("mic permission denied", "error");
    return;
  }

  // Open WebSocket and send start signal
  let ws;
  try {
    ws = await ensureSocket();
    ws.send(JSON.stringify({
      type: "start",
      conversation_id: state.currentConvId,
      username: state.username,
    }));
  } catch (e) {
    setStatus("connection failed", "error");
    stream.getTracks().forEach(t => t.stop());
    return;
  }

  // iOS Safari: prefer mp4/aac; Chrome/Firefox: prefer webm/opus
  let mimeType = '';
  if (MediaRecorder.isTypeSupported("audio/webm;codecs=opus")) {
    mimeType = "audio/webm;codecs=opus";
  } else if (MediaRecorder.isTypeSupported("audio/webm")) {
    mimeType = "audio/webm";
  } else if (MediaRecorder.isTypeSupported("audio/mp4")) {
    mimeType = "audio/mp4";
  }

  mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
  audioChunks = [];

  // Stream audio chunks to server via WebSocket as they arrive
  mediaRecorder.ondataavailable = async (e) => {
    if (e.data.size > 0) {
      audioChunks.push(e.data);
      // Send binary chunk over WebSocket
      if (ws.readyState === WebSocket.OPEN) {
        const buf = await e.data.arrayBuffer();
        ws.send(buf);
      }
    }
  };
  mediaRecorder.onstop = () => {
    stream.getTracks().forEach(t => t.stop());
    // Signal server that recording is done — triggers the pipeline
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "stop" }));
    }
  };

  mediaRecorder.start(250); // 250ms chunks for low-latency streaming
  recording = true;

  const btn = document.getElementById("record-btn");
  btn.classList.add("recording");
  btn.textContent = "\u23F9";

  timerSeconds = 0;
  timerInterval = setInterval(() => {
    timerSeconds++;
    document.getElementById("timer").textContent =
      `${String(Math.floor(timerSeconds / 60)).padStart(2, "0")}:${String(timerSeconds % 60).padStart(2, "0")}`;
  }, 1000);

  setStatus("recording...", "active");
}

function stopRecording() {
  if (!mediaRecorder || mediaRecorder.state === "inactive") return;
  clearInterval(timerInterval);
  document.getElementById("timer").textContent = "";

  // Pre-unlock an Audio element during user gesture (iOS requires this)
  unlockedAudio = new Audio();
  unlockedAudio.setAttribute('playsinline', '');
  unlockedAudio.src = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
  unlockedAudio.play().catch(() => {});

  mediaRecorder.stop();
  recording = false;

  _wsT0 = performance.now();
  showPipeline(true);
  setStep("asr", "active");
  setStatus("transcribing...");

  const btn = document.getElementById("record-btn");
  btn.classList.remove("recording");
  btn.textContent = "\uD83C\uDFA4";
  btn.disabled = true;
}

// ── UI helpers ─────────────────────────────────────────────────────────────────
function addBubble(role, text, animate = true, streaming = false) {
  const conv = document.getElementById("conversation");
  document.getElementById("empty")?.remove();

  const div = document.createElement("div");
  div.className = `bubble ${role}`;
  if (!animate) div.style.animation = 'none';

  if (role === "ai") {
    if (streaming) {
      // Streaming mode: plain text initially, will be finalized later
      div.dataset.streamingText = text;
      div.textContent = text;
    } else {
      div.innerHTML = formatAiMessage(text);
      _wireUpBubble(div, text);
    }
  } else {
    div.textContent = text;
  }

  conv.appendChild(div);
  requestAnimationFrame(() => { conv.scrollTop = conv.scrollHeight; });
  return div;
}

function appendToBubble(div, text) {
  const prev = div.dataset.streamingText || '';
  div.dataset.streamingText = prev + ' ' + text;
  div.textContent = div.dataset.streamingText;
  const conv = document.getElementById("conversation");
  requestAnimationFrame(() => { conv.scrollTop = conv.scrollHeight; });
}

function finalizeBubble(div, fullText) {
  delete div.dataset.streamingText;
  div.innerHTML = formatAiMessage(fullText);
  _wireUpBubble(div, fullText);
  const conv = document.getElementById("conversation");
  requestAnimationFrame(() => { conv.scrollTop = conv.scrollHeight; });
}

function _wireUpBubble(div, text) {
  // Wire up lesson toggle buttons
  div.querySelectorAll('.lesson-toggle').forEach(toggle => {
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      const content = toggle.nextElementSibling;
      if (content) content.classList.toggle('open');
    });
  });
  // Replay button
  const replayBtn = document.createElement('button');
  replayBtn.className = 'replay-btn';
  replayBtn.innerHTML = '&#x1F50A;';
  replayBtn.title = 'Replay';
  replayBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    replayAudio(text, replayBtn);
  });
  div.appendChild(replayBtn);
}

async function replayAudio(text, btn) {
  if (activeAudio) { activeAudio.pause(); activeAudio = null; }
  if (!state.currentConvId) return;

  btn.classList.add('loading');
  try {
    const formData = new FormData();
    formData.append('text', text);
    formData.append('conversation_id', state.currentConvId);
    const r = await api('/tts', { method: 'POST', body: formData });
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();

    const audioBytes = Uint8Array.from(atob(data.audio_base64), c => c.charCodeAt(0));
    const audioBlob = new Blob([audioBytes], { type: data.audio_mime || 'audio/mpeg' });
    const url = URL.createObjectURL(audioBlob);

    activeAudio = new Audio();
    activeAudio.setAttribute('playsinline', '');
    activeAudio.src = url;
    activeAudio.onended = () => { URL.revokeObjectURL(url); activeAudio = null; };
    activeAudio.onerror = () => { URL.revokeObjectURL(url); activeAudio = null; };
    await activeAudio.play();
  } catch (e) {
    console.error('[REPLAY]', e);
  } finally {
    btn.classList.remove('loading');
  }
}

function formatAiMessage(text) {
  // Extract [LESSON] / [课程] block if present
  const lessonRx = /\[LESSON\]\s*([\s\S]*?)(?=\[PROMPT\]|$)/i;
  const lessonRxCn = /\[课程\]\s*([\s\S]*?)(?=\[话题\]|$)/;
  let lessonMatch = text.match(lessonRx) || text.match(lessonRxCn);
  let lessonHtml = '';
  let mainText = text;

  if (lessonMatch) {
    const lessonContent = lessonMatch[1].trim();
    // Remove the [LESSON]...[PROMPT] from the main text
    mainText = text.replace(lessonMatch[0], '');
    // Build collapsible lesson
    const escapedLesson = lessonContent
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
    lessonHtml = `<div class="lesson-toggle"><span class="lesson-toggle-label">Lesson</span><span class="lesson-toggle-arrow">&#x25BC;</span></div><div class="lesson-content">${escapedLesson}</div>`;
  }

  // Clean up markers from main text
  mainText = mainText
    .replace(/\[(?:REPLY|PROMPT|回复|话题)\]\s*/gi, '')
    .trim();

  // Format remaining [...] and 【...】 as tips
  const formatted = mainText
    .replace(/\[([^\]]+)\]/g, '<span class="tip">[$1]</span>')
    .replace(/【([^】]+)】/g, '<span class="tip">【$1】</span>');

  return formatted + lessonHtml;
}

function addLatencyBadge(total, asr, llm, tts) {
  const conv = document.getElementById("conversation");
  const badge = document.createElement("div");
  const cls = total < 700 ? "fast" : total < 1000 ? "ok" : "slow";
  badge.className = `latency-badge ${cls}`;
  badge.textContent = `${total}ms total (asr ${asr} \u00B7 llm ${llm} \u00B7 tts ${tts})`;
  conv.appendChild(badge);
  requestAnimationFrame(() => { conv.scrollTop = conv.scrollHeight; });
}

function showError(msg) {
  const conv = document.getElementById("conversation");
  document.getElementById("empty")?.remove();
  const div = document.createElement("div");
  div.className = "bubble error";
  div.textContent = "\u26A0 " + msg;
  conv.appendChild(div);
  requestAnimationFrame(() => { conv.scrollTop = conv.scrollHeight; });
}

function setStatus(msg, cls = "") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = cls;
}

function setStep(id, s) {
  const el = document.getElementById("step-" + id);
  if (el) el.className = "pipe-step " + s;
}

function showPipeline(visible) {
  const el = document.getElementById("pipeline");
  el.classList.toggle("visible", visible);
  if (visible) ["asr", "llm", "tts"].forEach(id => setStep(id, ""));
}

function reset() {
  document.getElementById("record-btn").disabled = false;
  document.getElementById("record-btn").textContent = "\uD83C\uDFA4";
}

function relativeTime(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'Z');
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

// ── PWA: Service Worker + Push Notifications ────────────────────────────────────
let swRegistration = null;

async function initPWA() {
  if (!("serviceWorker" in navigator)) {
    document.getElementById("notify-btn").style.display = "none";
    return;
  }
  try {
    swRegistration = await navigator.serviceWorker.register("/sw.js");
    const ready = await navigator.serviceWorker.ready;
    const sub = await ready.pushManager.getSubscription();
    if (sub) document.getElementById("notify-btn").classList.add("active");
  } catch (e) {
    console.error("[PWA] SW registration failed:", e);
  }
  if (!("PushManager" in window)) {
    document.getElementById("notify-btn").style.display = "none";
  }
}

async function toggleReminder() {
  if (!swRegistration || !("PushManager" in window)) {
    setStatus("push not supported", "error");
    return;
  }
  const existing = await swRegistration.pushManager.getSubscription();
  if (existing) {
    await existing.unsubscribe();
    await fetch("/unsubscribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ endpoint: existing.endpoint }),
    });
    document.getElementById("notify-btn").classList.remove("active");
    setStatus("reminders off");
  } else {
    try {
      const permission = await Notification.requestPermission();
      if (permission !== "granted") { setStatus("notification denied", "error"); return; }
      const r = await fetch("/vapid-public-key");
      const { public_key } = await r.json();
      const key = urlBase64ToUint8Array(public_key);
      const sub = await swRegistration.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: key });
      await fetch("/subscribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(sub.toJSON()),
      });
      document.getElementById("notify-btn").classList.add("active");
      setStatus("reminders on");
    } catch (e) {
      setStatus("push failed: " + e.message, "error");
    }
  }
  setTimeout(() => setStatus(""), 3000);
}

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

initPWA();
